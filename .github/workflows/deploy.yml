name: Deploy QuizSpark

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  FRONTEND_BUCKET_NAME: ${{ secrets.FRONTEND_BUCKET_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init and Apply
        id: terraform
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
          echo "EC2_PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd server && npm ci && cd ..

      - name: Build frontend
        env:
          VITE_API_URL: "http://${{ env.EC2_PUBLIC_IP }}:3000"
        run: npm run build

      - name: Deploy frontend to S3
        run: |
          # Create a temporary directory for frontend files
          mkdir -p frontend_deploy
          cp -r dist/* frontend_deploy/
          
          # Upload frontend files to S3
          aws s3 sync frontend_deploy/ s3://quizspark-frontend --delete

      - name: Deploy backend
        run: |
          # Get the EC2 instance ID
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=quizspark" --query "Reservations[0].Instances[0].InstanceId" --output text)
          
          # Create a temporary directory for backend files
          mkdir -p backend_deploy
          cp -r server/* backend_deploy/
          rm -rf backend_deploy/node_modules
          
          # Copy only necessary backend files to S3
          aws s3 sync backend_deploy/ s3://quizspark-frontend/server/ --delete --exclude "node_modules/*" --exclude ".git/*" --exclude "*.log"
          
          # Run deployment script on EC2
          aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu && aws s3 sync s3://quizspark-frontend/server/ server/ --exclude \"node_modules/*\" --exclude \".git/*\" --exclude \"*.log\" && cd server && npm install && pm2 restart all"]'


          