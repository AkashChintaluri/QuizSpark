name: Deploy to AWS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: quizspark
  CLOUDFRONT_DISTRIBUTION_ID: E3QZQZQZQZQZQZ

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          npm install
          npm install -g @aws-amplify/cli

      - name: Build frontend
        run: |
          npm run build

      - name: Verify S3 bucket exists
        run: |
          if aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null; then
            echo "S3 bucket ${{ env.S3_BUCKET }} exists"
          else
            echo "Error: S3 bucket ${{ env.S3_BUCKET }} does not exist"
            exit 1
          fi

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: List all EC2 instances for debugging
        run: |
          echo "Listing all EC2 instances in ${{ env.AWS_REGION }}..."
          aws ec2 describe-instances --region ${{ env.AWS_REGION }} --query 'Reservations[*].Instances[*].[InstanceId,Tags[?Key==`Name`].Value|[0],State.Name]' --output table

      - name: Get EC2 instance ID
        id: get-ec2
        run: |
          echo "Getting EC2 instance ID..."
          INSTANCE_ID=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=quizspark" \
            --query 'Reservations[*].Instances[*].[InstanceId]' \
            --output text)
          
          if [ -z "$INSTANCE_ID" ]; then
            echo "No EC2 instance found with tag Name=quizspark in region ${{ env.AWS_REGION }}"
            echo "::set-output name=instance_id::none"
            exit 1
          else
            echo "Found EC2 instance: $INSTANCE_ID"
            echo "::set-output name=instance_id::$INSTANCE_ID"
          fi

      - name: Deploy backend
        if: steps.get-ec2.outputs.instance_id != 'none'
        run: |
          echo "Deploying backend to EC2 instance..."
          aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids ${{ steps.get-ec2.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu/quizspark && git pull && npm install && pm2 restart all"]'


          