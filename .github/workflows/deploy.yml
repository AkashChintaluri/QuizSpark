name: Deploy Application

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run build
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
          
      - name: Deploy to S3
        run: |
          # Create bucket if it doesn't exist
          aws s3api head-bucket --bucket ${{ secrets.S3_BUCKET_NAME }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ secrets.S3_BUCKET_NAME }} \
            --region ap-south-1 \
            --create-bucket-configuration LocationConstraint=ap-south-1
          
          # Configure S3 bucket for static website hosting
          aws s3api put-bucket-website \
            --bucket ${{ secrets.S3_BUCKET_NAME }} \
            --website-configuration '{"IndexDocument": {"Suffix": "index.html"}, "ErrorDocument": {"Key": "index.html"}}'
          
          # Upload CSS files with correct content type
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --region ap-south-1 \
            --cache-control "public, max-age=31536000" \
            --content-type "text/css" \
            --exclude "*" \
            --include "*.css"
          
          # Upload other static assets
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --region ap-south-1 \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.css"
          
          # Upload HTML files with no caching
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --region ap-south-1 \
            --cache-control "no-cache" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml"
          
          # Set bucket policy for public access
          aws s3api put-bucket-policy \
            --bucket ${{ secrets.S3_BUCKET_NAME }} \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "PublicReadGetObject",
                  "Effect": "Allow",
                  "Principal": "*",
                  "Action": "s3:GetObject",
                  "Resource": "arn:aws:s3:::${{ secrets.S3_BUCKET_NAME }}/*"
                }
              ]
            }'
          
          echo "Frontend deployed to: http://${{ secrets.S3_BUCKET_NAME }}.s3-website.ap-south-1.amazonaws.com"


          