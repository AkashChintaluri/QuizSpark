name: Deploy QuizSpark

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  FRONTEND_BUCKET_NAME: ${{ secrets.FRONTEND_BUCKET_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          export VITE_API_URL=http://$(terraform output -raw public_ip):3000
          npm run build

      - name: Deploy frontend to S3
        run: aws s3 sync dist/ s3://${{ env.FRONTEND_BUCKET_NAME }} --delete

      - name: Deploy backend
        run: |
          # Get the EC2 instance ID
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=quizspark" --query "Reservations[0].Instances[0].InstanceId" --output text)
          
          # Copy backend files to EC2
          aws s3 cp server/ s3://${{ env.FRONTEND_BUCKET_NAME }}/server/ --recursive
          
          # Run deployment script on EC2
          aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu && aws s3 sync s3://'${{ env.FRONTEND_BUCKET_NAME }}'/server/ server/ && cd server && npm install && pm2 restart all"]'


          