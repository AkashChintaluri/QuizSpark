name: Deploy Application

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build application
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run build
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          
      - name: Terraform Init
        run: |
          cd terraform
          terraform init
          
      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve
          
      - name: Deploy to S3
        run: |
          # Upload CSS files with correct content type
          aws s3 sync dist/ s3://quizspark-frontend \
            --delete \
            --region ap-south-1 \
            --cache-control "public, max-age=31536000" \
            --content-type "text/css" \
            --exclude "*" \
            --include "*.css"
          
          # Upload other static assets
          aws s3 sync dist/ s3://quizspark-frontend \
            --delete \
            --region ap-south-1 \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.css"
          
          # Upload HTML files with no caching
          aws s3 sync dist/ s3://quizspark-frontend \
            --delete \
            --region ap-south-1 \
            --cache-control "no-cache" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml"
          
          echo "Frontend deployed to: http://quizspark-frontend.s3-website.ap-south-1.amazonaws.com"


          



          